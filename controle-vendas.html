let nextId = RAW.length + 1;

const calcRow = (v) => {
  const custoTotal = v.custoUnit * v.quantidade;
  const vendaTotal = v.vendaUnit * v.quantidade;
  const lucro = vendaTotal - custoTotal;
  const margem = vendaTotal > 0 ? lucro / vendaTotal : 0;
  return { ...v, custoTotal, vendaTotal, lucro, margem };
};

const initialSales = RAW.map((r, i) => calcRow({
  id: i + 1, data: r[0], cliente: r[1], categoria: r[2], produto: r[3],
  custoUnit: r[4], vendaUnit: r[5], quantidade: r[6], status: r[7],
}));

const fmt = (v) => `R$ ${Number(v).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const fmtPct = (v) => `${(v * 100).toFixed(1)}%`;

/* ===================== ESTADO ===================== */

  sales: initialSales,
  view: "vendas",

  editId: null,
  showForm: false,
  filterStatus: "TODOS",
  filterCat: "TODAS",
  search: "",
  confirmDel: null,
};

/* ===================== HELPERS DE ESCAPE ===================== */
const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

/* ===================== DERIVADOS ===================== */
function getFiltered() {
  return state.sales.filter((s) => {
    if (state.filterStatus !== "TODOS" && s.status !== state.filterStatus) return false;
    if (state.filterCat !== "TODAS" && s.categoria !== state.filterCat) return false;
    if (state.search && !s.cliente.toLowerCase().includes(state.search.toLowerCase()) && !s.produto.toLowerCase().includes(state.search.toLowerCase())) return false;
    return true;
  });
}

function getTotals() {
  return {
    vendaTotal: state.sales.reduce((a, b) => a + b.vendaTotal, 0),
    lucroTotal: state.sales.reduce((a, b) => a + b.lucro, 0),
    emAberto: state.sales.filter((s) => s.status === "EM ABERTO" || s.status === "ATRASADO").reduce((a, b) => a + b.vendaTotal, 0),
  };
}

function getByCategoria() {
  const map = {};
  state.sales.forEach((s) => {
    if (!map[s.categoria]) map[s.categoria] = { vendas: 0, lucro: 0, count: 0 };
    map[s.categoria].vendas += s.vendaTotal;
    map[s.categoria].lucro += s.lucro;
    map[s.categoria].count += 1;
  });
  return Object.entries(map).sort((a, b) => b[1].vendas - a[1].vendas);
}

function getTopClientes() {
  const acc = {};
  state.sales.forEach((s) => {
    if (!acc[s.cliente]) acc[s.cliente] = { vendas: 0, count: 0 };
    acc[s.cliente].vendas += s.vendaTotal;
    acc[s.cliente].count += 1;
  });
  return Object.entries(acc).sort((a, b) => b[1].vendas - a[1].vendas).slice(0, 10);
}

/* ===================== AÇÕES ===================== */
function handleSave() {
  const f = state.form;
  if (!f.cliente || !f.produto || !f.vendaUnit || !f.custoUnit) return;
  const row = calcRow({ ...f, custoUnit: +f.custoUnit, vendaUnit: +f.vendaUnit, quantidade: +f.quantidade });
  if (state.editId !== null) {
    state.sales = state.sales.map((x) => (x.id === state.editId ? { ...row, id: state.editId } : x));
  } else {
    state.sales = [...state.sales, { ...row, id: nextId++ }];
  }
  state.form = emptyForm();
  state.editId = null;
  state.showForm = false;
  render();
}

function handleEdit(sale) {
  state.form = { data: sale.data, cliente: sale.cliente, categoria: sale.categoria, produto: sale.produto, custoUnit: sale.custoUnit, vendaUnit: sale.vendaUnit, quantidade: sale.quantidade, status: sale.status };
  state.editId = sale.id;
  state.showForm = true;
  render();
}

function handleDelete(id) {
  state.sales = state.sales.filter((x) => x.id !== id);
  state.confirmDel = null;
  render();
}

function handleStatusToggle(id) {
  state.sales = state.sales.map((x) => {
    if (x.id !== id) return x;
    const next = x.status === "PAGO" ? "EM ABERTO" : x.status === "EM ABERTO" ? "ATRASADO" : "PAGO";
    return { ...x, status: next };
  });
  render();
}

          const total = group.reduce((a, b) => a + b.vendaTotal, 0);
          return `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-radius:8px; margin-bottom:6px; background:${STATUS_STYLE[st].bg};">
              <div>
                <span style="font-weight:600; color:${STATUS_STYLE[st].color};">${STATUS_STYLE[st].label}</span>
                <span style="font-size:12px; color:#888; margin-left:8px;">${group.length} venda(s)</span>
              </div>
              <span style="font-weight:700; color:${STATUS_STYLE[st].color};">${fmt(total)}</span>
            </div>
          `;
        }).join("")}
      </div>

      <div style="background:white; border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="font-weight:700; font-size:15px; margin-bottom:12px;">📦 Vendas por Categoria</div>
        ${byCategoria.map(([cat, data]) => {
          const pct = (data.vendas / maxCatVendas) * 100;
          return `
            <div style="margin-bottom:12px;">
              <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                <span style="font-size:13px; font-weight:600;">${esc(cat)}</span>
                <span style="font-size:13px; color:#7c3aed; font-weight:700;">${fmt(data.vendas)}</span>
              </div>
              <div style="background:#f3e8ff; border-radius:4px; height:6px; overflow:hidden;">
                <div style="width:${pct}%; background:#7c3aed; height:100%; border-radius:4px;"></div>
              </div>
              <div style="font-size:11px; color:#888; margin-top:2px;">${data.count} vendas · lucro ${fmt(data.lucro)} · margem ${fmtPct(data.lucro / data.vendas)}</div>
            </div>
          `;
        }).join("")}
      </div>

      <div style="background:white; border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="font-weight:700; font-size:15px; margin-bottom:12px;">⭐ Top Clientes</div>
        ${topClientes.map(([cliente, d]) => `
          <div style="display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #f3f4f6;">
            <span style="font-size:14px;">${esc(cliente)}</span>
            <div style="text-align:right;">
              <span style="font-weight:700; color:#7c3aed; font-size:14px;">${fmt(d.vendas)}</span>
              <span style="font-size:11px; color:#aaa; margin-left:6px;">${d.count}x</span>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function renderFormModal() {
  const f = state.form;
  const showResumoVenda = f.custoUnit && f.vendaUnit;
  const vendaTotalPrev = (+f.vendaUnit || 0) * (+f.quantidade || 1);
  const lucroPrev = ((+f.vendaUnit || 0) - (+f.custoUnit || 0)) * (+f.quantidade || 1);
  const margemPrev = +f.vendaUnit > 0 ? ((+f.vendaUnit - +f.custoUnit) / +f.vendaUnit) : 0;

  return `
    <div id="modal-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; display:flex; align-items:flex-end;">
      <div style="background:white; width:100%; border-radius:20px 20px 0 0; padding:24px 20px 32px; max-height:92vh; overflow-y:auto;">
        <div style="font-weight:700; font-size:17px; margin-bottom:20px; color:#7c3aed;">
          ${state.editId ? "✏️ Editar Venda" : "➕ Nova Venda"}
        </div>

        <div style="margin-bottom:12px;">
          <label style="font-size:13px; font-weight:600; color:#555; display:block; margin-bottom:4px;">Data</label>
          <input type="date" class="form-field" data-key="data" value="${esc(f.data)}"
            style="width:100%; border:1.5px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:14px; outline:none;" />
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-size:13px; font-weight:600; color:#555; display:block; margin-bottom:4px;">Cliente</label>
          <input type="text" class="form-field" data-key="cliente" placeholder="Nome da cliente" value="${esc(f.cliente)}"
            style="width:100%; border:1.5px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:14px; outline:none;" />
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-size:13px; font-weight:600; color:#555; display:block; margin-bottom:4px;">Produto</label>
          <input type="text" class="form-field" data-key="produto" placeholder="Ex: Kit Capilar" value="${esc(f.produto)}"
            style="width:100%; border:1.5px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:14px; outline:none;" />
        </div>

        <div style="margin-bottom:12px;">
          <label style="font-size:13px; font-weight:600; color:#555; display:block; margin-bottom:4px;">Categoria</label>
          <select id="form-categoria" style="width:100%; border:1.5px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:14px; background:white;">
            ${CATEGORIAS.map((c) => `<option ${f.categoria === c ? "selected" : ""}>${esc(c)}</option>`).join("")}
          </select>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px;">
          <div>
            <label style="font-size:12px; font-weight:600; color:#555; display:block; margin-bottom:4px;">Custo Unit.</label>
            <input type="number" min="0" step="0.01" class="form-field" data-key="custoUnit" placeholder="0,00" value="${esc(f.custoUnit)}"
              style="width:100%; border:1.5px solid #e5e7eb; border-radius:8px; padding:10px 8px; font-size:14px;" />
          </div>
          <div>
            <label style="font-size:12px; font-weight:600; color:#555; display:block; margin-bottom:4px;">Venda Unit.</label>
            <input type="number" min="0" step="0.01" class="form-field" data-key="vendaUnit" placeholder="0,00" value="${esc(f.vendaUnit)}"
              style="width:100%; border:1.5px solid #e5e7eb; border-radius:8px; padding:10px 8px; font-size:14px;" />
          </div>
          <div>
            <label style="font-size:12px; font-weight:600; color:#555; display:block; margin-bottom:4px;">Qtd.</label>
            <input type="number" min="0" step="0.01" class="form-field" data-key="quantidade" placeholder="1" value="${esc(f.quantidade)}"
              style="width:100%; border:1.5px solid #e5e7eb; border-radius:8px; padding:10px 8px; font-size:14px;" />
          </div>
        </div>

        ${showResumoVenda ? `
          <div style="background:#f3e8ff; border-radius:10px; padding:10px 14px; margin-bottom:14px; font-size:13px;">
            <span style="margin-right:16px;">Venda total: <strong>${fmt(vendaTotalPrev)}</strong></span>
            <span style="margin-right:16px;">Lucro: <strong style="color:#15803d;">${fmt(lucroPrev)}</strong></span>
            <span>Margem: <strong>${fmtPct(margemPrev)}</strong></span>
          </div>
        ` : ""}

        <div style="margin-bottom:20px;">
          <label style="font-size:13px; font-weight:600; color:#555; display:block; margin-bottom:4px;">Status</label>
          <div style="display:flex; gap:8px;">
            ${STATUS_OPTS.map((s) => `
              <button class="status-pick-btn" data-status="${s}" style="flex:1; padding:8px 4px; border-radius:8px; border:2px solid ${f.status === s ? STATUS_STYLE[s].color : "#e5e7eb"}; background:${f.status === s ? STATUS_STYLE[s].bg : "white"}; color:${f.status === s ? STATUS_STYLE[s].color : "#888"}; font-weight:${f.status === s ? 700 : 400}; font-size:12px;">
                ${STATUS_STYLE[s].label}
              </button>
            `).join("")}
          </div>
        </div>

        <div style="display:flex; gap:10px;">
          <button id="btn-cancelar" style="flex:1; padding:12px; border-radius:10px; border:1.5px solid #e5e7eb; background:white; color:#888; font-weight:600;">
            Cancelar
          </button>
          <button id="btn-salvar" style="flex:2; padding:12px; border-radius:10px; border:none; background:linear-gradient(135deg, #7c3aed, #a855f7); color:white; font-weight:700; font-size:15px;">
            ${state.editId ? "Salvar Alterações" : "Adicionar Venda"}
          </button>
        </div>
      </div>
    </div>
  `;
}

function renderConfirmModal() {
  return `
    <div style="position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;">
      <div style="background:white; border-radius:16px; padding:24px; max-width:320px; width:100%;">
        <div style="font-size:16px; font-weight:700; margin-bottom:8px;">Excluir venda?</div>
        <div style="font-size:14px; color:#666; margin-bottom:20px;">Esta ação não pode ser desfeita.</div>
        <div style="display:flex; gap:10px;">
          <button id="btn-confirm-cancel" style="flex:1; padding:10px; border-radius:8px; border:1.5px solid #e5e7eb; background:white;">Cancelar</button>
          <button id="btn-confirm-delete" style="flex:1; padding:10px; border-radius:8px; border:none; background:#ef4444; color:white; font-weight:700;">Excluir</button>
        </div>
      </div>
    </div>
  `;
}

/* ===================== EVENTOS ===================== */
function attachEvents() {
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const btnNova = $("#btn-nova-venda");
  if (btnNova) btnNova.addEventListener("click", () => {
    state.form = emptyForm();
    state.editId = null;
    state.showForm = true;
    render();
  });

  $$(".tab-btn").forEach((btn) => btn.addEventListener("click", () => {
    state.view = btn.dataset.view;
    render();
  }));

  const searchInput = $("#search-input");
  if (searchInput) {
    searchInput.addEventListener("input", (e) => {
      state.search = e.target.value;
      const cursorPos = e.target.selectionStart;
      render();
      const newInput = $("#search-input");
      if (newInput) { newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
    });
  }

  $$(".filter-status-btn").forEach((btn) => btn.addEventListener("click", () => {
    state.filterStatus = btn.dataset.status;
    render();
  }));

  $$(".status-toggle").forEach((el) => el.addEventListener("click", () => {
    handleStatusToggle(Number(el.dataset.id));
  }));

  $$(".btn-edit").forEach((btn) => btn.addEventListener("click", () => {
    const sale = state.sales.find((s) => s.id === Number(btn.dataset.id));
    if (sale) handleEdit(sale);
  }));

  $$(".btn-delete").forEach((btn) => btn.addEventListener("click", () => {
    state.confirmDel = Number(btn.dataset.id);
    render();
  }));

  // Modal de formulário
  const overlay = $("#modal-overlay");
  if (overlay) {
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) {
        state.showForm = false;
        state.form = emptyForm();
        state.editId = null;
        render();
      }
    });
  }

  $$(".form-field").forEach((input) => {
    input.addEventListener("input", (e) => {
      state.form[input.dataset.key] = e.target.value;
      const supportsSelection = input.type !== "date" && input.type !== "number";
      const cursorPos = supportsSelection ? e.target.selectionStart : null;
      const key = input.dataset.key;
      render();
      const newInput = document.querySelector(`.form-field[data-key="${key}"]`);
      if (newInput) {
        newInput.focus();
        if (supportsSelection) {
          newInput.setSelectionRange(cursorPos, cursorPos);
        }
      }
    });
  });

  const formCategoria = $("#form-categoria");
  if (formCategoria) formCategoria.addEventListener("change", (e) => {
    state.form.categoria = e.target.value;
    render();
  });

  $$(".status-pick-btn").forEach((btn) => btn.addEventListener("click", () => {
    state.form.status = btn.dataset.status;
    render();
  }));

  const btnCancelar = $("#btn-cancelar");
  if (btnCancelar) btnCancelar.addEventListener("click", () => {
    state.showForm = false;
    state.form = emptyForm();
    state.editId = null;
    render();
  });

  const btnSalvar = $("#btn-salvar");
  if (btnSalvar) btnSalvar.addEventListener("click", handleSave);

  const btnConfirmCancel = $("#btn-confirm-cancel");
  if (btnConfirmCancel) btnConfirmCancel.addEventListener("click", () => {
    state.confirmDel = null;
    render();
  });

  const btnConfirmDelete = $("#btn-confirm-delete");
  if (btnConfirmDelete) btnConfirmDelete.addEventListener("click", () => {
    handleDelete(state.confirmDel);
  });
}

render();
</script>
</body>
</html>
